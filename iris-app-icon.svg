<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@800&amp;display=swap');
    </style>
    <!-- Subtle radial glow behind the dot -->
    <radialGradient id="glow" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#FFD100" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD100" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background with rounded corners (app icon) -->
  <rect width="512" height="512" rx="112" fill="#0A0A0A"/>

  <!-- Glow effect -->
  <circle cx="256" cy="190" r="140" fill="url(#glow)"/>

  <!-- The lowercase "i" — tittle (dot) in yellow, stem in white -->
  <!-- Tittle (dot of the i) — CNIB yellow -->
  <circle cx="256" cy="162" r="28" fill="#FFD100"/>

  <!-- Stem of the i — white -->
  <rect x="228" y="212" width="56" height="160" rx="8" fill="#FFFFFF"/>

  <!-- Period dot — yellow, bottom right -->
  <circle cx="320" cy="372" r="18" fill="#FFD100"/>
</svg>